CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# OLED disabled while debugging TPS43
CONFIG_ZMK_DISPLAY=n

# Mouse / pointing
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y

# Run input processing in its own thread
CONFIG_INPUT_MODE_THREAD=y
CONFIG_INPUT_THREAD_STACK_SIZE=4096

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable useful subsystem logs
CONFIG_ZMK_LOG_LEVEL_INF=y
CONFIG_INPUT_LOG_LEVEL_INF=y
CONFIG_I2C_LOG_LEVEL_INF=y

# Fonts (can stay enabled)
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_26=y
